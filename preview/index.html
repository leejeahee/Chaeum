<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채움 — 도장깨기 MVP</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <!-- Supabase JS SDK (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Kakao Maps API -->
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=bc704e6eafb7cbfbf1ffc6989d74d88c"></script>
</head>
<body>
  <div class="phone-container">
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">📶 5G 🔋</span>
    </div>

    <!-- Map Screen (메인) -->
    <div class="screen-content" id="screen-map">
      <!-- 포인트 배지 -->
      <div class="map-top-bar">
        <div class="points-badge">
          <span class="coin-icon">🍩</span>
          <span class="points-text" id="user-points">1,708</span>
        </div>
        <div class="map-title">분당 도장깨기</div>
      </div>

      <!-- 카카오 지도 컨테이너 -->
      <div id="kakao-map"></div>
    </div>

    <!-- My Page Screen -->
    <div class="screen-content hidden" id="screen-mypage">
      <div class="top-nav">
        <h2>마이페이지</h2>
      </div>
      <div class="mypage-body">
        <p>준비 중인 기능입니다.</p>
      </div>
    </div>

    <!-- Bottom Navigation (GNB) -->
    <div class="bottom-nav" id="bottom-nav">
      <div class="nav-item active" id="nav-map" onclick="switchTab('map')">
        <span class="icon">📍</span>
        <span class="label">지도</span>
      </div>
      <div class="nav-item" id="nav-mypage" onclick="switchTab('mypage')">
        <span class="icon">👤</span>
        <span class="label">마이페이지</span>
      </div>
    </div>
  </div>

  <!-- Supabase 초기화 -->
  <script src="supabase_init.js"></script>
  <script src="script.js"></script>
</body>
</html>
